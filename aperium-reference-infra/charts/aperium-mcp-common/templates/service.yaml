apiVersion: v1
kind: Service
metadata:
  name: {{ include "aperium-mcp-common.fullname" . }}
  labels:
    {{- include "aperium-mcp-common.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWaves.service | quote }}
spec:
  type: {{ .Values.service.type }}
  sessionAffinity: {{ .Values.service.sessionAffinity | default "None" }}
  {{- with .Values.service.sessionAffinityConfig }}
  sessionAffinityConfig:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aperium-mcp-common.selectorLabels" . | nindent 4 }}
