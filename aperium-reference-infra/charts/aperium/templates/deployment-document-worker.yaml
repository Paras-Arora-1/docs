{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aperium.workerFullname" . }}
  labels:
    {{- include "aperium.workerLabels" . | nindent 4 }}
spec:
  replicas: {{ ternary .Values.worker.autoscaling.minReplicaCount .Values.worker.replicas .Values.worker.autoscaling.enabled }}
  {{- with .Values.worker.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aperium.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "aperium.workerSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "aperium.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      containers:
        - name: document-worker
          image: "{{ .Values.image.backendRepository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          {{- if .Values.worker.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metrics.port }}
              protocol: TCP
          {{- end }}
          env:
            - name: DOCUMENT_PROCESSING_MODE
              value: worker
            {{- if and .Values.worker.autoscaling.enabled (or (.Capabilities.APIVersions.Has "keda.sh/v1alpha1") (.Capabilities.APIVersions.Has "keda.sh/v1alpha1/ScaledObject")) }}
            - name: {{ .Values.worker.autoscaling.connectionFromEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "aperium.workerKedaConnectionSecretName" . }}
                  key: {{ .Values.worker.autoscaling.connectionSecret.key }}
                  optional: {{ .Values.worker.autoscaling.connectionSecret.optional }}
            {{- end }}
            {{- if .Values.databaseUrlExternalSecret.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseUrlExternalSecret.targetName | quote }}
                  key: DATABASE_URL
                  optional: true
            {{- end }}
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.redisUrlExternalSecret.enabled }}
            - name: REDIS_ENABLED
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisUrlExternalSecret.targetName | quote }}
                  key: REDIS_ENABLED
                  optional: true
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisUrlExternalSecret.targetName | quote }}
                  key: REDIS_URL
                  optional: true
            {{- end }}
          {{- if or .Values.backendEnvSecret.enabled .Values.sharedStorage.enabled }}
          volumeMounts:
            {{- if .Values.backendEnvSecret.enabled }}
            - name: backend-env
              mountPath: {{ .Values.backendEnvSecret.mountPath }}
              subPath: {{ .Values.backendEnvSecret.subPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.sharedStorage.enabled }}
            - name: shared-storage
              mountPath: {{ .Values.sharedStorage.mountPath | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
        {{- if .Values.cloudsql.enabled }}
        - name: cloud-sql-proxy
          image: "{{ .Values.cloudsql.image.repository }}:{{ .Values.cloudsql.image.tag }}"
          imagePullPolicy: {{ .Values.cloudsql.image.pullPolicy }}
          args:
            - "--private-ip"
            {{- if .Values.cloudsql.runConnectionTest }}
            - "--run-connection-test"
            {{- end }}
            - "--auto-iam-authn"
            - "--structured-logs"
            - "--port={{ .Values.cloudsql.port }}"
            - {{ .Values.cloudsql.connectString | quote }}
          securityContext:
            runAsNonRoot: true
          resources:
            {{- toYaml .Values.cloudsql.resources | nindent 12 }}
        {{- end }}
      {{- if or .Values.backendEnvSecret.enabled .Values.sharedStorage.enabled }}
      volumes:
        {{- if .Values.backendEnvSecret.enabled }}
        - name: backend-env
          secret:
            secretName: {{ .Values.backendEnvSecret.name }}
            items:
              - key: {{ .Values.backendEnvSecret.key }}
                path: .env
        {{- end }}
        {{- if .Values.sharedStorage.enabled }}
        - name: shared-storage
          persistentVolumeClaim:
            claimName: {{ include "aperium.sharedStorageClaimName" . | quote }}
        {{- end }}
      {{- end }}
{{- end }}
