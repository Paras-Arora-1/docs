apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aperium.backendFullname" . }}
  labels:
    {{- include "aperium.backendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aperium.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "aperium.backendSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "aperium.serviceAccountName" . }}
      containers:
        - name: aperium-backend
          image: "{{ .Values.image.backendRepository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
              protocol: TCP
          env:
            {{- toYaml .Values.backend.env | nindent 12 }}
            {{- if .Values.databaseUrlExternalSecret.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseUrlExternalSecret.targetName | quote }}
                  key: DATABASE_URL
                  optional: true
            {{- end }}
            {{- if .Values.redisUrlExternalSecret.enabled }}
            - name: REDIS_ENABLED
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisUrlExternalSecret.targetName | quote }}
                  key: REDIS_ENABLED
                  optional: true
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisUrlExternalSecret.targetName | quote }}
                  key: REDIS_URL
                  optional: true
            {{- end }}
          {{- if or .Values.backendEnvSecret.enabled .Values.sharedStorage.enabled }}
          volumeMounts:
            {{- if .Values.backendEnvSecret.enabled }}
            - name: backend-env
              mountPath: {{ .Values.backendEnvSecret.mountPath }}
              subPath: {{ .Values.backendEnvSecret.subPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.sharedStorage.enabled }}
            - name: shared-storage
              mountPath: {{ .Values.sharedStorage.mountPath | quote }}
            {{- end }}
          {{- end }}
          readinessProbe:
            {{- toYaml .Values.backend.probes.readiness | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.backend.probes.liveness | nindent 12 }}
          {{- if .Values.backend.probes.startup.enabled }}
          startupProbe:
            {{- toYaml (omit .Values.backend.probes.startup "enabled") | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
        {{- if .Values.cloudsql.enabled }}
        - name: cloud-sql-proxy
          image: "{{ .Values.cloudsql.image.repository }}:{{ .Values.cloudsql.image.tag }}"
          imagePullPolicy: {{ .Values.cloudsql.image.pullPolicy }}
          args:
            - "--private-ip"
            {{- if .Values.cloudsql.runConnectionTest }}
            - "--run-connection-test"
            {{- end }}
            - "--auto-iam-authn"
            - "--structured-logs"
            - "--port={{ .Values.cloudsql.port }}"
            - {{ .Values.cloudsql.connectString | quote }}
          securityContext:
            runAsNonRoot: true
          resources:
            {{- toYaml .Values.cloudsql.resources | nindent 12 }}
        {{- end }}
      {{- if or .Values.backendEnvSecret.enabled .Values.sharedStorage.enabled }}
      volumes:
        {{- if .Values.backendEnvSecret.enabled }}
        - name: backend-env
          secret:
            secretName: {{ .Values.backendEnvSecret.name }}
            items:
              - key: {{ .Values.backendEnvSecret.key }}
                path: .env
        {{- end }}
        {{- if .Values.sharedStorage.enabled }}
        - name: shared-storage
          persistentVolumeClaim:
            claimName: {{ include "aperium.sharedStorageClaimName" . | quote }}
        {{- end }}
      {{- end }}
