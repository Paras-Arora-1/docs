{{- if .Values.databaseUrlExternalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.databaseUrlExternalSecret.targetName | quote }}
  labels:
    {{- include "aperium.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.databaseUrlExternalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.databaseUrlExternalSecret.clusterSecretStoreName | quote }}
  target:
    name: {{ .Values.databaseUrlExternalSecret.targetName | quote }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: {{ printf "{{ .databaseUrl }}" | quote }}
  data:
    - secretKey: databaseUrl
      remoteRef:
        key: {{ .Values.databaseUrlExternalSecret.remoteSecretName | quote }}
{{- end }}
