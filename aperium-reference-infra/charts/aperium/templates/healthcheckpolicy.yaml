{{- if and .Values.gatewayApi.enabled (eq (default "gke" .Values.gatewayApi.provider) "gke") .Values.gatewayApi.healthCheckPolicy.enabled }}
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: {{ include "aperium.fullname" . }}-healthcheck-policy
  labels:
    {{- include "aperium.labels" . | nindent 4 }}
spec:
  default:
    checkIntervalSec: {{ .Values.gatewayApi.healthCheckPolicy.checkIntervalSec }}
    timeoutSec: {{ .Values.gatewayApi.healthCheckPolicy.timeoutSec }}
    healthyThreshold: {{ .Values.gatewayApi.healthCheckPolicy.healthyThreshold }}
    unhealthyThreshold: {{ .Values.gatewayApi.healthCheckPolicy.unhealthyThreshold }}
    logConfig:
      enabled: {{ .Values.gatewayApi.healthCheckPolicy.logEnabled }}
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: {{ .Values.gatewayApi.healthCheckPolicy.requestPath | quote }}
        portSpecification: USE_SERVING_PORT
  targetRef:
    group: ""
    kind: Service
    name: {{ include "aperium.backendFullname" . }}
{{- end }}
