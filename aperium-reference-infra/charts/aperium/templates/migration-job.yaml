{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "aperium.fullname" . }}-migrations
  labels:
    {{- include "aperium.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: {{ .Values.migrations.job.hookDeletePolicy | default "BeforeHookCreation" }}
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit:{{- if .Values.migrations.job.disableRetry }} 0{{- else }} {{ .Values.migrations.job.backoffLimit }}{{- end }}
  activeDeadlineSeconds: {{ .Values.migrations.job.activeDeadlineSeconds }}
  {{- if .Values.migrations.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.migrations.job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "aperium.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      serviceAccountName: {{ include "aperium.serviceAccountName" . }}
      restartPolicy: Never
      {{- if .Values.cloudsql.enabled }}
      initContainers:
        - name: cloud-sql-proxy
          restartPolicy: Always
          image: "{{ .Values.cloudsql.image.repository }}:{{ .Values.cloudsql.image.tag }}"
          imagePullPolicy: {{ .Values.cloudsql.image.pullPolicy }}
          args:
            - "--private-ip"
            {{- if .Values.migrations.cloudsqlRunConnectionTest }}
            - "--run-connection-test"
            {{- end }}
            - "--auto-iam-authn"
            - "--structured-logs"
            - "--port={{ .Values.cloudsql.port }}"
            - {{ .Values.cloudsql.connectString | quote }}
          securityContext:
            runAsNonRoot: true
          resources:
            {{- toYaml .Values.cloudsql.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: migrations
          image: "{{ default .Values.image.backendRepository .Values.image.migrationsRepository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.migrations.command }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          {{- end }}
          {{- if .Values.migrations.args }}
          args:
            {{- toYaml .Values.migrations.args | nindent 12 }}
          {{- end }}
          env:
            - name: SERVICE_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: SENTRY_RELEASE
              value: {{ .Values.image.tag | quote }}
            {{- if .Values.databaseUrlExternalSecret.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseUrlExternalSecret.targetName | quote }}
                  key: DATABASE_URL
                  optional: true
            {{- end }}
            {{- with .Values.migrations.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          {{- if or .Values.backendEnvSecret.enabled .Values.migrations.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.backendEnvSecret.enabled }}
            - name: backend-env
              mountPath: {{ .Values.backendEnvSecret.mountPath }}
              subPath: {{ .Values.backendEnvSecret.subPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.migrations.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.backendEnvSecret.enabled .Values.migrations.extraVolumes }}
      volumes:
        {{- if .Values.backendEnvSecret.enabled }}
        - name: backend-env
          secret:
            secretName: {{ .Values.backendEnvSecret.name }}
            items:
              - key: {{ .Values.backendEnvSecret.key }}
                path: .env
        {{- end }}
        {{- with .Values.migrations.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
