apiVersion: v1
kind: Service
metadata:
  name: {{ include "aperium.backendFullname" . }}
  labels:
    {{- include "aperium.backendLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aperium.backendSelectorLabels" . | nindent 4 }}
