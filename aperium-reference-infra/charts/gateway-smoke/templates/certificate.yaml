{{- if .Values.gatewayApi.enabled }}
{{- range .Values.gatewayApi.hosts }}
{{- $certName := printf "%s-tls" .name }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $certName | quote }}
  namespace: {{ $.Values.gatewayApi.gateway.namespace }}
spec:
  secretName: {{ $certName | quote }}
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  dnsNames:
    - {{ .host | quote }}
---
{{- end }}
{{- end }}
