{{- if .Values.gatewayApi.enabled }}
{{- $svcPort := .Values.service.port -}}
{{- range .Values.gatewayApi.hosts }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}-route
  labels:
    {{- include "gateway-smoke.labels" $ | nindent 4 }}
    gke-gateway: "true"
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .host | quote }}
spec:
  hostnames:
    - {{ .host | quote }}
  parentRefs:
    - name: {{ $.Values.gatewayApi.gateway.name }}
      namespace: {{ $.Values.gatewayApi.gateway.namespace }}
      sectionName: {{ $.Release.Namespace }}-{{ .name }}-route
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "gateway-smoke.fullname" $ }}
          port: {{ $svcPort }}
---
{{- end }}
{{- end }}
