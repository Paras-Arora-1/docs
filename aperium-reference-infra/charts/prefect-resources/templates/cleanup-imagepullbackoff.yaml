{{- if .Values.cleanup.imagePullBackoff.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-imagepullbackoff-cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-imagepullbackoff-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-imagepullbackoff-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-imagepullbackoff-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-imagepullbackoff-cleanup
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-imagepullbackoff-cleanup
data:
  cleanup.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    NAMESPACE="${NAMESPACE:-prefect}"
    MIN_AGE_SECONDS="${MIN_AGE_SECONDS:-3600}"
    REASONS_REGEX="${REASONS_REGEX:-ImagePullBackOff|ErrImagePull}"

    parse_ts() {
      local iso="$1"
      if date -u -d "$iso" +%s >/dev/null 2>&1; then
        date -u -d "$iso" +%s
      elif date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$iso" +%s >/dev/null 2>&1; then
        date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$iso" +%s
      else
        return 1
      fi
    }

    now=$(date -u +%s)
    while IFS=$'\t' read -r pod job created reasons; do
      [[ -z "$pod" || -z "$created" ]] && continue
      if [[ "$reasons" =~ $REASONS_REGEX ]]; then
        ts=$(parse_ts "$created" 2>/dev/null || true)
        [[ -z "$ts" ]] && continue
        age=$((now - ts))
        if (( age >= MIN_AGE_SECONDS )); then
          if [[ -n "$job" ]]; then
            kubectl -n "$NAMESPACE" delete job "$job" --ignore-not-found
          else
            kubectl -n "$NAMESPACE" delete pod "$pod" --ignore-not-found
          fi
        fi
      fi
    done < <(kubectl -n "$NAMESPACE" get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.labels.job-name}{"\t"}{.metadata.creationTimestamp}{"\t"}{range .status.containerStatuses[*]}{.state.waiting.reason}{" "}{end}{range .status.initContainerStatuses[*]}{.state.waiting.reason}{" "}{end}{"\n"}{end}')
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-imagepullbackoff-cleanup
spec:
  schedule: {{ .Values.cleanup.imagePullBackoff.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ .Release.Name }}-imagepullbackoff-cleanup
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: {{ .Values.cleanup.imagePullBackoff.image | quote }}
              command: ["/bin/bash", "/scripts/cleanup.sh"]
              env:
                - name: NAMESPACE
                  value: {{ .Release.Namespace | quote }}
                - name: MIN_AGE_SECONDS
                  value: {{ .Values.cleanup.imagePullBackoff.minAgeSeconds | quote }}
                - name: REASONS_REGEX
                  value: {{ .Values.cleanup.imagePullBackoff.reasonsRegex | quote }}
              volumeMounts:
                - name: cleanup-script
                  mountPath: /scripts
                  readOnly: true
{{- if .Values.cleanup.imagePullBackoff.resources }}
              resources:
{{ toYaml .Values.cleanup.imagePullBackoff.resources | nindent 16 }}
{{- end }}
          volumes:
            - name: cleanup-script
              configMap:
                name: {{ .Release.Name }}-imagepullbackoff-cleanup
                defaultMode: 0755
{{- end }}
