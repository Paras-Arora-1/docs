apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: terraform-agents-multi
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.clusterSecretStore.name }}
  target:
    name: terraform-agents-multi
    template:
      type: Opaque
      data:
        teamToken: |-
          {{ printf "{{ .teamToken }}" }}
    creationPolicy: Owner
  data:
    - secretKey: teamToken
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: {{ .Values.secrets.multi.gcpName }}
        property: {{ .Values.secrets.multi.teamTokenKey }}
