apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gke-gateway
  namespace: argo-cd
spec:
  project: tools
  sources:
    - repoURL: https://github.com/YOUR_ORG/aperium-reference-infra.git
      path: charts/gke-gateway-api
      targetRevision: main
      helm:
        valueFiles:
          - $values/envs/aperium-apps-prod/values/gke-gateway.yaml
    - repoURL: https://github.com/YOUR_ORG/aperium-reference-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-infra
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /spec/listeners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
