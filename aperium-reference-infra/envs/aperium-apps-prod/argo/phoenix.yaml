apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phoenix
  namespace: argo-cd
spec:
  project: tools
  sources:
    - repoURL: https://github.com/Arize-ai/phoenix.git
      targetRevision: arize-phoenix-v12.28.1
      path: helm
      helm:
        valueFiles:
          - $values/envs/aperium-apps-prod/values/phoenix.yaml
    - repoURL: https://github.com/YOUR_ORG/aperium-reference-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: phoenix
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
