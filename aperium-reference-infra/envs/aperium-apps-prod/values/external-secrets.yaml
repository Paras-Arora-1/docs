serviceAccount:
  name: external-secrets
  annotations:
    iam.gke.io/gcp-service-account: external-secrets@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi

webhook:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

certController:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

extraObjects:
  - apiVersion: external-secrets.io/v1
    kind: ClusterSecretStore
    metadata:
      name: YOUR_CLUSTER_SECRET_STORE_NAME
    spec:
      provider:
        gcpsm:
          projectID: YOUR_GCP_PROJECT_ID
          auth:
            workloadIdentity:
              clusterLocation: YOUR_GCP_REGION
              clusterName: YOUR_GKE_CLUSTER_NAME
              serviceAccountRef:
                name: external-secrets
                namespace: external-secrets

  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: phoenix-secret
      namespace: phoenix
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: YOUR_CLUSTER_SECRET_STORE_NAME
      target:
        name: phoenix-secret
        creationPolicy: Owner
        deletionPolicy: Retain
      data:
        - secretKey: PHOENIX_SECRET
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: phoenix-auth
            metadataPolicy: None
            property: PHOENIX_SECRET
        - secretKey: PHOENIX_ADMIN_SECRET
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: phoenix-auth
            metadataPolicy: None
            property: PHOENIX_ADMIN_SECRET
        - secretKey: PHOENIX_POSTGRES_PASSWORD
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: phoenix-auth
            metadataPolicy: None
            property: PHOENIX_POSTGRES_PASSWORD
        - secretKey: PHOENIX_SMTP_PASSWORD
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: phoenix-auth
            metadataPolicy: None
            property: PHOENIX_SMTP_PASSWORD
        - secretKey: PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: phoenix-auth
            metadataPolicy: None
            property: PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD
